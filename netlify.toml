[build]
  base = "."
  command = "npm --prefix tidspuls-frontend ci && npm --prefix tidspuls-frontend run build"
  publish = "tidspuls-frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  # Production API. Viktigt: om du lägger VITE_API_BASE_URL i Netlify UI med *tomt värde* åsidosätts denna rad och bygget kan få fel URL.
  VITE_API_BASE_URL = "https://tidspuls-app.onrender.com/api/v1"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
