[build]
  base = "."
  command = "npm --prefix tidspuls-frontend ci && npm --prefix tidspuls-frontend run build"
  publish = "tidspuls-frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  # Production API (override in Netlify Site settings → Environment variables per branch/context if needed)
  VITE_API_BASE_URL = "https://tidspuls-app.onrender.com/api/v1"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
