name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests-and-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Block committed Laravel APP_KEY secrets
        run: |
          set -euo pipefail
          # Require material after base64: so docs mentioning APP_KEY=base64:… do not trip CI.
          if grep -RIn \
              --exclude-dir=vendor \
              --exclude-dir=.git \
              --exclude-dir=node_modules \
              -E 'APP_KEY[[:space:]]*=[[:space:]]*base64:[A-Za-z0-9+/]{32,}=*' \
              .; then
            echo 'Committed APP_KEY with base64 value is not allowed (use Render env + tests/phpunit-bootstrap.php).'
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Finish Composer setup
        run: composer dump-autoload --optimize --no-interaction

      - name: Run tests
        run: php artisan test

      - name: Check formatting
        run: vendor/bin/pint --test

      - name: Run static analysis
        run: vendor/bin/phpstan analyse --memory-limit=1G
